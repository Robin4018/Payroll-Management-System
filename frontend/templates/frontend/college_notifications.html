{% extends 'frontend/dashboard_base.html' %}

{% block header_title %}Notifications{% endblock %}

{% block content_body %}
<div class="notifications-page-wrapper">
    <div class="notif-top-bar">
        <div class="notif-title-section">
            <h1 class="page-main-title">Notifications</h1>
            <p class="notif-subtitle">Stay updated with your latest payroll and attendance alerts</p>
        </div>
        <button onclick="markAllRead()" class="btn-premium-action">
            <i class="fas fa-check-double"></i>
            <span>Mark All as Read</span>
        </button>
    </div>

    <div class="notification-feed-card">
        <div id="notifList" class="notification-list-container">
            <div class="loading-state-modern">
                <div class="spinner-container">
                    <i class="fas fa-circle-notch fa-spin"></i>
                </div>
                <p>Syncing your alerts...</p>
            </div>
        </div>
    </div>
</div>

<style>
    .notifications-page-wrapper {
        width: 100%;
        padding: 0.5rem 0.5rem 3rem;
    }

    /* Top Bar Styling */
    .notif-top-bar {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 1.25rem;
        padding: 0;
    }

    .page-main-title {
        font-size: 1.6rem;
        font-weight: 850;
        color: var(--text-main);
        letter-spacing: -0.02em;
        margin-bottom: 0.15rem;
    }

    .notif-subtitle {
        color: var(--text-muted);
        font-size: 0.95rem;
        font-weight: 500;
        opacity: 0.8;
    }

    /* Action Button */
    .btn-premium-action {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        padding: 0.6rem 1.25rem;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--text-main);
        font-weight: 700;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: var(--shadow-sm);
    }

    .btn-premium-action:hover {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(99, 102, 241, 0.25);
    }

    .btn-premium-action i {
        font-size: 1rem;
        opacity: 0.8;
    }

    /* Feed Card */
    .notification-feed-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.04);
        overflow: hidden;
    }

    /* List Item */
    .notif-item {
        display: flex;
        align-items: flex-start;
        gap: 1.25rem;
        padding: 1.25rem 2.25rem;
        border-bottom: 1px solid var(--border-color);
        transition: all 0.2s ease;
        text-decoration: none;
        color: inherit;
        position: relative;
    }

    .notif-item:last-child {
        border-bottom: none;
    }

    .notif-item:hover {
        background: rgba(99, 102, 241, 0.02);
    }

    /* Unread Indicator - Side Vertical Line */
    .notif-item.unread {
        background: rgba(99, 102, 241, 0.01);
    }

    .notif-item.unread::before {
        content: '';
        position: absolute;
        left: 0;
        top: 15%;
        height: 70%;
        width: 4px;
        background: var(--primary);
        border-radius: 0 4px 4px 0;
        box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
    }

    /* Icon Styling */
    .notif-icon-box {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.15rem;
        flex-shrink: 0;
        position: relative;
        z-index: 1;
        transition: transform 0.3s ease;
    }

    .notif-item:hover .notif-icon-box {
        transform: scale(1.08);
    }

    .notif-icon-box::after {
        content: '';
        position: absolute;
        inset: 0;
        background: currentColor;
        opacity: 0.08;
        border-radius: inherit;
        z-index: -1;
    }

    /* Type Specific Colors */
    .icon-payroll {
        color: #10b981;
    }

    .icon-leave {
        color: #f59e0b;
    }

    .icon-payslip {
        color: #6366f1;
    }

    .icon-alert {
        color: #ef4444;
    }

    /* Content Area */
    .notif-body {
        flex: 1;
        padding-top: 0.2rem;
    }

    .notif-meta-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.4rem;
    }

    .notif-title {
        font-size: 1.1rem;
        font-weight: 800;
        color: var(--text-main);
        letter-spacing: -0.01em;
    }

    .notif-timestamp {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-muted);
        opacity: 0.7;
    }

    .notif-description {
        font-size: 0.95rem;
        line-height: 1.6;
        color: var(--text-muted);
        font-weight: 500;
    }

    /* States */
    .loading-state-modern {
        padding: 6rem 2rem;
        text-align: center;
    }

    .spinner-container {
        font-size: 2.5rem;
        color: var(--primary);
        margin-bottom: 1rem;
        opacity: 0.5;
    }

    .loading-state-modern p {
        font-weight: 700;
        color: var(--text-muted);
        font-size: 1.1rem;
    }

    [data-theme='dark'] .notification-feed-card {
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        background: #0c0e12;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', loadNotifications);

    async function loadNotifications() {
        const token = localStorage.getItem('access_token');
        try {
            const res = await fetch('/api/notifications/', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const results = data.results || data;

            const list = document.getElementById('notifList');
            list.innerHTML = '';

            if (results.length === 0) {
                list.innerHTML = `
                    <div style="padding: 6rem 2rem; text-align: center; color: var(--text-muted);">
                        <div style="width: 80px; height: 80px; background: var(--bg-body); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid var(--border-color);">
                            <i class="far fa-bell-slash" style="font-size: 2rem; opacity: 0.3;"></i>
                        </div>
                        <h4 style="color: var(--text-main); font-weight: 700; margin-bottom: 0.5rem;">All caught up!</h4>
                        <p style="font-size: 0.95rem; font-weight: 500; opacity: 0.7;">You have no new notifications at the moment.</p>
                    </div>`;
                return;
            }

            results.forEach(n => {
                const icon = getIcon(n.notification_type);
                const statusClass = n.is_read ? 'read' : 'unread';
                const date = new Date(n.created_at).toLocaleString('en-IN', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                list.innerHTML += `
                    <div class="notif-item ${statusClass}">
                        <div class="notif-icon-box ${icon.colorClass}">${icon.html}</div>
                        <div class="notif-body">
                            <div class="notif-meta-top">
                                <span class="notif-title">${n.title}</span>
                                <span class="notif-timestamp">${date}</span>
                            </div>
                            <p class="notif-description">${n.message}</p>
                        </div>
                    </div>
                `;
            });
        } catch (e) {
            console.error(e);
            document.getElementById('notifList').innerHTML = '<div style="padding: 2rem; color: var(--danger); text-align: center;">Failed to load notifications.</div>';
        }
    }

    async function markAllRead() {
        const token = localStorage.getItem('access_token');
        try {
            const res = await fetch('/api/notifications/mark_all_as_read/', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'X-CSRFToken': getCookie('csrftoken')
                }
            });
            if (res.ok) {
                showToast('All notifications marked as read', 'success');
                loadNotifications();
            }
        } catch (e) { console.error(e); }
    }

    function getIcon(type) {
        switch (type) {
            case 'PAYROLL':
                return { html: '<i class="fas fa-file-invoice-dollar"></i>', colorClass: 'icon-payroll' };
            case 'LEAVE':
                return { html: '<i class="fas fa-calendar-day"></i>', colorClass: 'icon-leave' };
            case 'PAYSLIP':
                return { html: '<i class="fas fa-file-pdf"></i>', colorClass: 'icon-payslip' };
            case 'REIMBURSEMENT':
                return { html: '<i class="fas fa-receipt"></i>', colorClass: 'icon-payroll' };
            default:
                return { html: '<i class="fas fa-bell"></i>', colorClass: 'icon-alert' };
        }
    }
</script>
{% endblock %}
