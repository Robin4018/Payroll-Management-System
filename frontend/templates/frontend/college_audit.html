{% extends 'frontend/dashboard_base.html' %}

{% block header_title %}&nbsp;{% endblock %}

{% block content_body %}
<style>
    /* Professional Design System - Audit Logs Refinement */
    .header-card-premium {
        background: var(--bg-card);
        border-radius: 16px;
        padding: 2.25rem 2.5rem;
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-sm);
        margin-bottom: 2rem;
        margin-top: -1.5rem;
    }

    .table-card {
        background: var(--bg-card);
        border-radius: 20px;
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-sm);
        overflow: hidden;
    }

    .audit-table {
        width: 100%;
        border-collapse: collapse;
    }

    .audit-table th {
        background: var(--primary-light);
        padding: 1.5rem 2rem;
        text-align: left;
        font-size: 0.75rem;
        font-weight: 850;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        border-bottom: 2px solid var(--border-color);
        vertical-align: middle;
    }

    .audit-table td {
        padding: 1.5rem 2rem;
        border-bottom: 1px solid var(--border-color);
        color: var(--text-main);
        vertical-align: middle;
        font-size: 0.95rem;
    }

    tr.row-hover:hover {
        background: var(--primary-light);
    }

    /* Glassmorphic Status Badges */
    .status-badge {
        padding: 0.5rem 1.25rem;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: 850;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 110px;
    }

    .badge-info {
        background: rgba(37, 99, 235, 0.08);
        color: #1d4ed8;
        border: 1px solid rgba(37, 99, 235, 0.15);
    }

    .badge-success {
        background: rgba(34, 197, 94, 0.08);
        color: #15803d;
        border: 1px solid rgba(34, 197, 94, 0.15);
    }

    .badge-warning {
        background: rgba(245, 158, 11, 0.08);
        color: #b45309;
        border: 1px solid rgba(245, 158, 11, 0.15);
    }

    .badge-danger {
        background: rgba(239, 68, 68, 0.08);
        color: #b91c1c;
        border: 1px solid rgba(239, 68, 68, 0.15);
    }

    .action-btn {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1.5px solid var(--border-color);
        cursor: pointer;
        transition: all 0.2s ease;
        background: var(--bg-card);
    }

    .action-btn:hover {
        background: var(--primary-light);
        border-color: var(--primary);
        transform: translateY(-1px);
    }

    /* Animations */
    @keyframes slideUpFade {
        from {
            opacity: 0;
            transform: translateY(15px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .animate-slide-up {
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    tr.row-animate {
        opacity: 0;
        animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
</style>

<div class="header-card-premium animate-slide-up">
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 2rem;">
        <div>
            <h3
                style="margin: 0; font-size: 1.75rem; font-weight: 850; color: var(--text-main); letter-spacing: -0.03em;">
                Recent Activity</h3>
            <p style="margin: 0.6rem 0 0 0; color: var(--text-muted); font-size: 1.05rem; font-weight: 500;">
                See all recent changes and login activity.</p>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <div style="position: relative;">
                <i class="fas fa-filter"
                    style="position: absolute; left: 1.1rem; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.9rem;"></i>
                <select id="actionFilter" class="form-control" onchange="loadLogs()"
                    style="padding-left: 2.75rem; width: 260px; font-weight: 600; background: var(--bg-input); border: 1px solid var(--border-color); height: 50px; border-radius: 14px; cursor: pointer; font-size: 0.95rem; color: var(--text-main);">
                    <option value="">All Actions</option>
                    <option value="LOGIN">Logins</option>
                    <option value="UPDATE">Updates</option>
                    <option value="PAYROLL_RUN">Payroll</option>
                    <option value="DELETE">Deletions</option>
                    <option value="CREATE">Created Items</option>
                </select>
            </div>
            <button onclick="loadLogs()" class="action-btn" title="Refresh">
                <i class="fas fa-sync-alt" style="color: var(--text-muted);"></i>
            </button>
        </div>
    </div>
</div>

<div class="table-card animate-slide-up" style="animation-delay: 0.15s;">
    <div style="overflow-x: auto;">
        <table class="audit-table" style="width: 100%;">
            <thead>
                <tr>
                    <th style="width: 220px;">When</th>
                    <th style="width: 260px;">Who</th>
                    <th style="width: 180px; text-align: center;">Action</th>
                    <th>What Happened</th>
                    <th style="width: 180px; text-align: center;">IP Address</th>
                </tr>
            </thead>
            <tbody id="logsTableBody">
                <tr>
                    <td colspan="5" style="text-align: center; padding: 6rem;">
                        <div class="fas fa-circle-notch fa-spin"
                            style="font-size: 2.5rem; color: #2563eb; margin-bottom: 2rem;"></div>
                        <div style="font-weight: 750; color: var(--text-muted); font-size: 1.2rem;">Loading Activity...
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', loadLogs);

    async function loadLogs() {
        const token = localStorage.getItem('access_token');
        const filter = document.getElementById('actionFilter').value;
        let url = '/api/audit-logs/';
        if (filter) url += `?action=${filter}`;

        const tbody = document.getElementById('logsTableBody');
        tbody.innerHTML = `
            <tr>
                <td colspan="5" style="text-align: center; padding: 6rem;">
                    <div class="fas fa-circle-notch fa-spin" style="font-size: 2.5rem; color: #2563eb; margin-bottom: 2rem;"></div>
                    <div style="font-weight: 750; color: var(--text-muted); font-size: 1.2rem;">Loading Activity...</div>
                </td>
            </tr>
        `;

        try {
            const res = await authFetch(url);
            if (!res.ok) throw new Error('Vault access denied');

            const data = await res.json();
            const logs = data.results || data;

            tbody.innerHTML = '';

            if (logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 6rem; color: #94a3b8; font-weight: 750;">No activity found.</td></tr>';
                return;
            }

            logs.forEach((log, index) => {
                const badgeClass = getBadgeClass(log.action);
                const delay = Math.min(index * 0.04, 1.0);

                const timestamp = new Date(log.timestamp);
                const dateHeader = timestamp.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                const timeSub = timestamp.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });

                const row = `
                    <tr class="row-hover row-animate" style="animation-delay: ${delay}s;">
                        <td>
                            <div style="font-weight: 850; color: var(--text-main); font-size: 1.05rem; letter-spacing: -0.01em;">${dateHeader}</div>
                            <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 800; margin-top: 5px; text-transform: uppercase; letter-spacing: 0.02em;">${timeSub}</div>
                        </td>
                        <td>
                            <div style="font-weight: 900; color: var(--text-main); font-size: 1.05rem; letter-spacing: -0.01em;">${log.actor_name || 'System Operator'}</div>
                            <div style="font-size: 0.78rem; color: var(--text-muted); font-weight: 750; margin-top: 5px;">${log.actor_email || 'automated-system@upms.internal'}</div>
                        </td>
                        <td style="text-align: center;">
                            <span class="status-badge ${badgeClass}">${log.action}</span>
                        </td>
                        <td style="color: var(--text-main); font-weight: 650; font-size: 1rem; line-height: 1.6;">${log.details}</td>
                        <td style="text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 0.88rem; color: var(--text-muted); font-weight: 750;">
                            ${log.ip_address || '—'}
                        </td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        } catch (e) {
            console.error(e);
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 6rem; color: #ef4444; font-weight: 850; font-size: 1.2rem;">VAULT ERROR: Synchronization failed. Check security credentials.</td></tr>';
        }
    }

    function getBadgeClass(action) {
        if (action === 'LOGIN' || action === 'PAYROLL_RUN' || action === 'PROCESS' || action === 'CREATE') return 'badge-success';
        if (action === 'DELETE' || action === 'LOGOUT' || action === 'BLOCK' || action === 'FAILURE') return 'badge-danger';
        if (action === 'UPDATE' || action === 'EDIT' || action === 'MODIFY') return 'badge-warning';
        return 'badge-info';
    }
</script>
{% endblock %}
