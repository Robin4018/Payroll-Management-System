{% extends 'frontend/base.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPMS | Login</title>
    <link rel="stylesheet" href="/static/frontend/css/style.css?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="logo-area">
                <div class="auth-title">UPMS</div>
                <div class="auth-subtitle">Unified Payroll Management System</div>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="e.g. admin" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg class="eye-hide" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" style="display: none;">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
                <div id="loginError" class="error-msg hidden"></div>

                <div id="signup-link-container" style="margin-top: 1.5rem; color: var(--text-dim); font-size: 0.9rem;">
                    Don't have an account? <a href="/signup/"
                        style="color: var(--primary); text-decoration: none; font-weight: 500;">Create Account</a>
                </div>
                <div id="switch-login-container" style="margin-top: 0.5rem; font-size: 0.8rem;">
                    <a href="/?login_type=admin&next=/dashboard/college/"
                        style="color: var(--text-dim); text-decoration: none; opacity: 0.7;">Admin Login</a>
                </div>
            </form>
        </div>
    </div>
    <script src="/static/frontend/js/app.js?v=5"></script>
    <script>
        // Password Toggle
        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const button = input.nextElementSibling;
            const eyeShow = button.querySelector('.eye-show');
            const eyeHide = button.querySelector('.eye-hide');

            if (input.type === 'password') {
                input.type = 'text';
                eyeShow.style.display = 'none';
                eyeHide.style.display = 'block';
            } else {
                input.type = 'password';
                eyeShow.style.display = 'block';
                eyeHide.style.display = 'none';
            }
        }

        // Dynamic UI based on login_type
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const loginType = urlParams.get('login_type');

            if (loginType === 'admin') {
                // Admin UI Changes
                document.querySelector('.auth-title').innerText = 'UPMS Admin';
                document.querySelector('.auth-subtitle').innerText = 'Administrative Access Portal';
                document.querySelector('.auth-card').style.borderTop = '4px solid #f59e0b'; // Gold border for admin

                // Update Button
                const btn = document.querySelector('.btn-primary');
                btn.innerText = 'Admin Sign In';
                btn.style.background = 'linear-gradient(135deg, #f59e0b 0%, #d97706 100%)';

                // Hide Signup
                document.getElementById('signup-link-container').style.display = 'none';

                // Change "Admin Login" link to "Employee Login"
                const switchLinkContainer = document.getElementById('switch-login-container');
                switchLinkContainer.innerHTML = `
                    <a href="/" style="color: var(--text-dim); text-decoration: none; opacity: 0.7;">← Back to Employee Login</a>
                `;
            }
        });
    </script>
</body>

</html>
{% endblock %}
