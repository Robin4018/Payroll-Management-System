{% extends 'frontend/dashboard_staff_base.html' %}
{% block header_title %}{{ title }}{% endblock %}

{% block content_body %}
<style>
    .placeholder-container {
        height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: fadeInUp 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .premium-placeholder-card {
        background: white;
        padding: 4rem;
        border-radius: 32px;
        text-align: center;
        max-width: 500px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
    }

    .icon-wrapper {
        width: 100px;
        height: 100px;
        background: #f8fafc;
        border-radius: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 2.5rem;
        position: relative;
    }

    .icon-wrapper i {
        font-size: 2.5rem;
        color: #94a3b8;
    }

    .icon-dot {
        position: absolute;
        top: -5px;
        right: -5px;
        width: 20px;
        height: 20px;
        background: #3b82f6;
        border: 4px solid white;
        border-radius: 50%;
    }

    .placeholder-title {
        font-size: 2rem;
        font-weight: 850;
        color: #0f172a;
        margin-bottom: 1rem;
        letter-spacing: -0.02em;
    }

    .placeholder-text {
        color: #64748b;
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 2.5rem;
        font-weight: 500;
    }

    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        background: #0f172a;
        color: white;
        padding: 1rem 2rem;
        border-radius: 16px;
        font-weight: 700;
        text-decoration: none;
        transition: all 0.2s;
        box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.1);
    }

    .back-btn:hover {
        transform: translateY(-2px);
        background: #1e293b;
        color: white;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(40px);
            filter: blur(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }
    }
</style>

<div class="placeholder-container">
    <div class="premium-placeholder-card">
        <div class="icon-wrapper">
            <i class="fas fa-layer-group"></i>
            <div class="icon-dot"></div>
        </div>
        <h2 class="placeholder-title">Under Construction</h2>
        <p class="placeholder-text">We're refining the <strong>{{ title }}</strong> module to ensure a world-class
            experience. Stay tuned for the upcoming update.</p>
        <a href="/dashboard/staff/" class="back-btn">
            <i class="fas fa-chevron-left"></i>
            Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}
